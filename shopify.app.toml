# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "30b61b3bd5038578bbbdbe7aab2bf7b1"
name = "HourlyScheduling"
application_url = "https://example.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "orders/paid" ]
  uri = "/webhooks/orders/paid"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_metaobject_definitions,write_metaobjects,write_products,read_orders,read_customers"

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[app_proxy]
url = "https://example.com/apps/scheduling"
subpath = "scheduling"
prefix = "apps"

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"

[[extensions]]
type = "flow_trigger"
name = "Booking Confirmado"
handle = "booking-confirmed"
description = "Se dispara cuando un agendamiento de servicio es confirmado. Úsalo para enviar recordatorios automáticos al cliente."

  [[extensions.settings.fields]]
  key = "booking_id"
  name = "ID del Booking"
  type = "single_line_text_field"

  [[extensions.settings.fields]]
  key = "customer_email"
  name = "Email del Cliente"
  type = "single_line_text_field"

  [[extensions.settings.fields]]
  key = "customer_name"
  name = "Nombre del Cliente"
  type = "single_line_text_field"

  [[extensions.settings.fields]]
  key = "service_date"
  name = "Fecha del Servicio"
  type = "single_line_text_field"

  [[extensions.settings.fields]]
  key = "start_time"
  name = "Hora de Inicio"
  type = "single_line_text_field"

  [[extensions.settings.fields]]
  key = "hours"
  name = "Horas Contratadas"
  type = "single_line_text_field"

  [[extensions.settings.fields]]
  key = "order_id"
  name = "ID de la Orden"
  type = "single_line_text_field"

  [[extensions.settings.fields]]
  key = "order_name"
  name = "Número de la Orden"
  type = "single_line_text_field"
